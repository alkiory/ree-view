services:
  backend:
    build: ./backend
    ports:
      - '5001:5001'
    environment:
      PORT: 5001
      CORS_ORIGINS: http://localhost:5173,http://localhost:80
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/energy-balance}
      REE_API_URL: https://apidatos.ree.es/es/datos/balance/balance-electrico
      REE_FRONTERAS_API_URL: https://apidatos.ree.es/es/datos/balance/todas-fronteras-fisicos-programados
      REE_API_URL_ERROR: https://apidatos.ree.es/invalid-endpoint
    depends_on:
      - mongo
    # Auto-recovery: si NestJS crashea por una peer dep faltante como pasó
    # con @apollo/server, el contenedor se reinicia solo. Combinado con el
    # HEALTHCHECK del Dockerfile, Docker también lo apaga si las queries
    # a /graphql fallan 3 veces seguidas.
    restart: always
    networks:
      - app-network

  frontend:
    build: ./frontend
    restart: always
    expose:
      - '3001'
    environment:
      - VITE_API_URL=/graphql
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      - backend
    networks:
      - app-network

  mongo:
    image: mongo:6.0
    environment:
      MONGO_INITDB_DATABASE: energy-balance
    volumes:
      - mongo-data:/data/db
    # Exponer 27017 al host permite usar `pnpm dev` (en el host) contra
    # el Mongo del compose sin instalar MongoDB localmente. En prod se
    # retira esta línea para mantener el puerto interno.
    ports:
      - '27017:27017'
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/energy-balance --quiet
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
  npm_network:
    external: true