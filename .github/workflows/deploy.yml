name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend
        run: pnpm --filter frontend build
        env:
          # GitHub Pages sirve el proyecto bajo /ree-view/ (project page).
          # Sin esta env var, Vite genera <script src="/assets/..."> que el
          # browser resuelve a https://alkiory.github.io/assets/... → 404 → pantalla blanca.
          # Vite la traduce en dist/index.html a /ree-view/assets/... correcto.
          VITE_BASE_URL: /ree-view/
          VITE_API_URL: https://api-ree-view.alkiory.com/graphql

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build

    runs-on: ubuntu-latest

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
